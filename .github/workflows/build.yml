# .github/workflows/build.yml
name: Build Python Executables

# 触发条件：仅在 push 到 main 分支或推送 v* 标签时触发
on:
  push

# 如果你希望任何分支的 push 都触发，可以把 branches 删掉，只保留 push: {} 即可。
# 但通常推荐只对主分支和标签构建，避免浪费资源。

jobs:
  # ==================== 构建 Windows ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows Executable
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: main.py
          mode: onefile
          assume-yes-for-downloads: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-windows
          path: build/main.exe

  # ==================== 构建 Linux ====================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux Executable
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: main.py
          mode: onefile
          assume-yes-for-downloads: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-linux
          path: build/main.bin
