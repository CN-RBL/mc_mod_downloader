# .github/workflows/build.yml
name: Build Python Executables

on:
  push

jobs:
  # ==================== 构建 Windows ====================
  build-windows:
    if: ${{ !contains(join(github.event.commits.*.message), 'skip') }}
    runs-on: windows-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v7

      - name: 初始化 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          architecture: 'x64'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 编译 Windows 可执行文件
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: main.py
          mode: onefile
          show-memory: true
          windows-uac-admin: true
          lto: yes
          windows-console-mode: attach
          python-flag: no_docstrings
          jobs: all
          assume-yes-for-downloads: true

      - name: 重命名文件
        run: ren main.exe mcmdr.exe
        shell: cmd

      - name: 上传 Windows 产出物 qwq
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: mcmdr.exe

  # ==================== 构建 Windows x32 ====================
  build-windows-x32:
    if: ${{ !contains(join(github.event.commits.*.message), 'skip') }}
    runs-on: windows-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v7

      - name: 初始化 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          architecture: 'x32'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 编译 Windows x32 可执行文件
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: main.py
          mode: onefile
          show-memory: true
          windows-uac-admin: true
          lto: yes
          windows-console-mode: attach
          python-flag: no_docstrings
          jobs: all
          assume-yes-for-downloads: true

      - name: 重命名文件
        run: ren main.exe mcmdr-x32.exe
        shell: cmd

      - name: 上传 Windows x32 产出物 qwq
        uses: actions/upload-artifact@v7
        with:
          name: windows-x32
          path: mcmdr-x32.exe

  # ==================== 构建 Linux ====================
  build-linux:
    if: ${{ !contains(join(github.event.commits.*.message), 'skip') }}
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v7

      - name: 初始化 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          architecture: 'x64'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 编译 Linux 可执行文件
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: main.py
          mode: onefile
          show-memory: true
          jobs: all
          lto: yes
          python-flag: no_docstrings
          assume-yes-for-downloads: true

      - name: 重命名文件
        run: mv main.bin mcmdr.bin

      - name: 上传 Linux 产出物 qwq
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: mcmdr.bin
